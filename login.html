<!DOCTYPE html>
<html>
<head>
    <title>Nitte Marathon Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;

            /* ADD YOUR COLLEGE IMAGE HERE */
            background-image:url('https://nitte.edu.in/nsamfgcb/img/thumb%20img/home-thumb-video.jpg');

            background-size:cover;
            background-position:center;
            position:relative;
        }

        /* DARK OVERLAY */

        body::before{
            content:'';
            position:absolute;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.55);
        }

        /* LOGIN BOX */

        .login-box{
            position:relative;
            z-index:2;

            width:380px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(15px);

            border:1px solid rgba(255,255,255,0.2);

            padding:40px;

            border-radius:25px;

            text-align:center;

            box-shadow:0 10px 35px rgba(0,0,0,0.35);

            animation:fadeIn 1s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(40px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        /* LOGO */

        .logo{
            font-size:60px;
            margin-bottom:10px;
        }

        /* TITLE */

        h2{
            color:white;
            margin-bottom:10px;
            font-size:35px;
        }

        .sub{
            color:#ddd;
            margin-bottom:30px;
            font-size:15px;
        }

        /* INPUTS */

        .input-box{
            position:relative;
            margin:18px 0;
        }

        .input-box input{
            width:100%;
            padding:14px 45px 14px 15px;
            border:none;
            outline:none;
            border-radius:12px;
            font-size:16px;
            background:rgba(255,255,255,0.18);
            color:white;
        }

        .input-box input::placeholder{
            color:#eee;
        }

        /* SHOW PASSWORD */

        .show{
            position:absolute;
            right:15px;
            top:14px;
            cursor:pointer;
            color:white;
        }

        /* REMEMBER */

        .remember{
            display:flex;
            align-items:center;
            justify-content:flex-start;
            margin-top:10px;
            color:white;
            font-size:14px;
        }

        .remember input{
            margin-right:8px;
        }

        /* BUTTON */

        button{
            width:100%;
            padding:14px;
            margin-top:25px;
            border:none;
            border-radius:35px;
            background:linear-gradient(135deg,#ff9800,#ff5722);
            color:white;
            font-size:17px;
            font-weight:600;
            cursor:pointer;
            transition:0.4s;
        }

        button:hover{
            transform:translateY(-4px) scale(1.03);
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        /* TOGGLE */

        .toggle{
            margin-top:22px;
            color:#fff;
            cursor:pointer;
            font-size:15px;
        }

        .toggle:hover{
            text-decoration:underline;
        }

        /* MESSAGE */

        #msg{
            margin-top:15px;
            color:#ffcccb;
            font-size:15px;
        }

        /* FOOTER */

        .footer{
            margin-top:25px;
            color:#ddd;
            font-size:13px;
        }

        /* MOBILE */

        @media(max-width:500px){

            .login-box{
                width:90%;
                padding:30px;
            }

            h2{
                font-size:28px;
            }

        }

    </style>
</head>

<body>

    <div class="login-box">

        <div class="logo"></div>

        <h2 id="title">Nitte Marathon</h2>

        <p class="sub">
            Welcome to Nitte Marathon 2026
        </p>

        <!-- USERNAME -->

        <div class="input-box">
            <input type="text" id="user" placeholder="Enter Username">
        </div>

        <!-- PASSWORD -->

        <div class="input-box">

            <input type="password" id="pass" placeholder="Enter Password">

            <span class="show" onclick="togglePass()">
                👁
            </span>

        </div>

        <!-- REMEMBER -->

        <div class="remember">
            <input type="checkbox" id="remember">
            <label>Remember Me</label>
        </div>

        <!-- BUTTON -->

        <button id="mainBtn">
            Sign Up
        </button>

        <!-- TOGGLE -->

        <p class="toggle" onclick="switchMode()">
            Already have account? Login
        </p>

        <!-- MESSAGE -->

        <p id="msg"></p>

        <div class="footer">
            © Nitte Marathon 2026
        </div>

    </div>

<script>

let isLogin = false;

/* SHOW PASSWORD */

function togglePass(){

    let p = document.getElementById("pass");

    if(p.type === "password"){
        p.type = "text";
    }

    else{
        p.type = "password";
    }
}

/* SWITCH MODE */

function switchMode(){

    isLogin = !isLogin;

    document.getElementById("title").innerText =
    isLogin ? "Login Account" : "Create Account";

    document.getElementById("mainBtn").innerText =
    isLogin ? "Login" : "Sign Up";

    document.querySelector(".toggle").innerText =
    isLogin ?
    "Don't have account? Sign Up"
    :
    "Already have account? Login";

    document.getElementById("msg").innerText = "";
}

/* SIGNUP */

function signup(){

    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u === "" || p === ""){

        document.getElementById("msg").innerText =
        "Please fill all fields";

        return;
    }

    if(p.length < 6){

        document.getElementById("msg").innerText =
        "Password must be at least 6 characters";

        return;
    }

    localStorage.setItem("username",u);
    localStorage.setItem("password",p);

    document.getElementById("msg").style.color = "#90ee90";

    document.getElementById("msg").innerText =
    "Signup successful! Please login.";

    switchMode();
}

/* LOGIN */

function login(){

    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    let su = localStorage.getItem("username");
    let sp = localStorage.getItem("password");

    if(u === su && p === sp){

        localStorage.setItem("loggedIn","true");

        if(document.getElementById("remember").checked){

            localStorage.setItem("rememberUser",u);
        }

        window.location.href = "index.html";
    }

    else{

        document.getElementById("msg").style.color = "#ffcccb";

        document.getElementById("msg").innerText =
        "Invalid Username or Password";
    }
}

/* BUTTON ACTION */

document.getElementById("mainBtn").onclick = function(){

    if(isLogin){
        login();
    }

    else{
        signup();
    }
}

</script>

</body>
</html>
