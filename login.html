<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 300px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px;
            width: 100%;
            background: #4facfe;
            color: white;
            border: none;
        }

        .toggle {
            cursor: pointer;
            color: blue;
        }
    </style>
</head>

<body>

<div class="box">
    <h2 id="title">Sign Up</h2>

    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">

    <span onclick="togglePass()">👁 Show</span>

    <button onclick="signup()" id="mainBtn">Sign Up</button>

    <p class="toggle" onclick="switchMode()">Already have account? Login</p>

    <p id="msg" style="color:red;"></p>
</div>

<script>
let isLogin = false;

function togglePass() {
    let p = document.getElementById("pass");
    p.type = (p.type === "password") ? "text" : "password";
}

function switchMode() {
    isLogin = !isLogin;

    document.getElementById("title").innerText = isLogin ? "Login" : "Sign Up";
    document.getElementById("mainBtn").innerText = isLogin ? "Login" : "Sign Up";
    document.querySelector(".toggle").innerText =
        isLogin ? "Don't have account? Sign Up" : "Already have account? Login";
}

function signup() {
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if (u === "" || p === "") {
        document.getElementById("msg").innerText = "Fill all fields!";
        return;
    }

    localStorage.setItem("username", u);
    localStorage.setItem("password", p);

    alert("Signup successful!");
    switchMode();
}

function login() {
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    let su = localStorage.getItem("username");
    let sp = localStorage.getItem("password");

    if (u === su && p === sp) {
        localStorage.setItem("loggedIn", "true");
        window.location.href = "index.html";
    } else {
        document.getElementById("msg").innerText = "Invalid login!";
    }
}

// Fix: button action switch
document.getElementById("mainBtn").onclick = function() {
    if (isLogin) login();
    else signup();
};
</script>

</body>
</html>
